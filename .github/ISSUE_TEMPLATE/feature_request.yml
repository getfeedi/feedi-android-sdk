name: Feature request
description: Suggest an improvement to the Feedi Android SDK
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        The SDK is intentionally small, headless, and dependency-light. Proposals that
        keep it that way are most likely to land. See
        [CONTRIBUTING.md](https://github.com/getfeedi/feedi-android-sdk/blob/main/CONTRIBUTING.md).
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not just the proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the SDK to do? Include API sketches if helpful.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you have tried or other approaches you weighed.
    validations:
      required: false
