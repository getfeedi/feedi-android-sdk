name: Bug report
description: Report a problem with the Feedi Android SDK
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please do not report security vulnerabilities here —
        see [SECURITY.md](https://github.com/getfeedi/feedi-android-sdk/blob/main/SECURITY.md).
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps (and a code snippet, if possible) that trigger the bug.
      placeholder: |
        1. Configure with `Feedi.configure(...)`
        2. Call `Feedi.submitFeedback(...)`
        3. ...
    validations:
      required: true
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: android-api
    attributes:
      label: Android API level / device
      placeholder: "API 34, Pixel 7 emulator"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or stack trace
      description: Paste any FeediError details or stack traces. Redact secrets — never paste write keys.
      render: text
    validations:
      required: false
