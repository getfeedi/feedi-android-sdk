name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref so a quick succession of pushes does
# not pile up redundant runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Show toolchain
        run: ./gradlew --version

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      # Assemble the release AAR so packaging/`explicitApi()` regressions surface
      # in CI rather than at publish time.
      - name: Assemble release AAR
        run: ./gradlew assembleRelease
